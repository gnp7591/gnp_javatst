# Allure Results Directory
allure.results.directory=target/allure-results

# Enable screenshots on failure (for UI tests with Selenium)
allure.steps.dir=target/allure-results

# Link patterns for issue tracking and TMS
allure.link.issue.pattern=https://example.com/issue/{}
allure.link.tms.pattern=https://example.com/testcase/{}

# Test environment properties
allure.link.source.pattern=https://github.com/example/repo/blob/master/{}

# Report title and logo
allure.report.title=Selenium Test Report