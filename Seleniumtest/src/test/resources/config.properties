# Application Configuration File
# All test credentials and URLs are maintained here

# ========== Application URLs ==========
app.url=https://www.saucedemo.com/
app.inventory.url=https://www.saucedemo.com/inventory.html

# ========== Valid User Credentials ==========
valid.username=standard_user
valid.password=secret_sauce

# ========== Invalid User Credentials ==========
invalid.username=invalid_user
invalid.password=invalid_password

# ========== Test Data ==========
empty.username=
empty.password=

# ========== Browser Configuration ==========
browser=chrome
browser.maximize=true

# ========== Wait Times (in seconds) ==========
implicit.wait=10
explicit.wait=10
page.load.timeout=30

# ========== Allure Configuration ==========
allure.results.dir=target/allure-results
allure.report.dir=target/allure-report

# ========== Test Execution Configuration ==========
headless.mode=false
screenshot.on.failure=true
